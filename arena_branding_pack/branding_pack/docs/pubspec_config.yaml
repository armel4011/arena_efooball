# ════════════════════════════════════════════════════════════════════
# ARENA — Configuration combinée Icônes + Splash
# ════════════════════════════════════════════════════════════════════
# À AJOUTER dans le pubspec.yaml du projet (sans casser ce qui existe)
# ════════════════════════════════════════════════════════════════════


# ─────────────────────────────────────────────────────────────────────
# 1. AJOUTER DANS dependencies:
# ─────────────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter
  # ... tes dépendances existantes
  flutter_riverpod: ^2.4.10        # Pour SplashRouter (probablement déjà présent)
  shared_preferences: ^2.2.2       # Pour détecter le 1er lancement
  google_fonts: ^6.2.1             # Bebas Neue, Instrument Serif, Space Grotesk


# ─────────────────────────────────────────────────────────────────────
# 2. AJOUTER DANS dev_dependencies:
# ─────────────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  # ... tes dev_dependencies existantes
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1


# ─────────────────────────────────────────────────────────────────────
# 3. CONFIG flutter_launcher_icons (au niveau racine du pubspec)
#    → Pour le flavor USER par défaut
# ─────────────────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/arena_user_1024.png"

  # Adaptive icon Android 8+
  adaptive_icon_background: "assets/icons/adaptive/user/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/icons/adaptive/user/ic_launcher_foreground.png"
  adaptive_icon_monochrome: "assets/icons/adaptive/user/ic_launcher_monochrome.png"

  # iOS strict (App Store rejette si alpha)
  remove_alpha_ios: true

  # Web PWA
  web:
    generate: true
    image_path: "assets/icons/arena_user_1024.png"
    background_color: "#0A0A0F"
    theme_color: "#4C7AFF"


# ─────────────────────────────────────────────────────────────────────
# 4. CONFIG flutter_native_splash (au niveau racine)
#    → Pour le flavor USER par défaut
# ─────────────────────────────────────────────────────────────────────
flutter_native_splash:
  # Couleur de fond (matche le coin haut-gauche du dégradé)
  color: "#4C7AFF"
  
  # Image plein écran (Android < 12 + iOS)
  image: "assets/splash/splash_user.png"
  
  # Android 12+ : juste l'icône centrée
  android_12:
    image: "assets/splash/splash_icon_user.png"
    color: "#0A0A0F"
    icon_background_color: "#4C7AFF"
  
  ios: true
  ios_content_mode: scaleAspectFill
  android: true
  android_gravity: fill
  fullscreen: true
  
  # Web
  web: true
  web_image_mode: cover


# ─────────────────────────────────────────────────────────────────────
# 5. SECTION flutter.assets (déclarer les dossiers)
# ─────────────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/icons/adaptive/user/
    - assets/icons/adaptive/admin/
    - assets/splash/
    # ... tes autres assets existants


# ════════════════════════════════════════════════════════════════════
# FICHIERS SÉPARÉS À CRÉER POUR LE FLAVOR ADMIN
# ════════════════════════════════════════════════════════════════════


