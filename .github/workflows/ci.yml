name: CI

# Déclenché sur push main + chaque PR. Jobs :
#   - analyze-and-test : analyse statique + tests + garde-fous design.
#   - build-app-bundle : build release .aab des 2 flavors (user/admin) —
#     `flutter analyze`/`test` ne lancent aucun build Gradle, donc une
#     régression native (ex. plugin Kotlin qui ne compile plus) passe
#     inaperçue sans ce job. L'AAB est l'artefact d'expédition Play Store.
# Sert de filet de sécurité avant merge — Flutter SDK n'est pas fourni
# par les runners GitHub, on utilise subosito/flutter-action qui le
# télécharge et le met en cache.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les jobs en cours sur la même branche : utile quand on push
# plusieurs commits d'affilée — pas besoin de tout évaluer.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 17
        # Requis pour build_runner / freezed (analyzer dépend du JDK).
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pas de pin de version : `app_usage 4.1.0` exige Dart ≥ 3.8,
          # ce qui n'est dispo qu'à partir de Flutter 3.32. Le channel
          # `stable` tracking est suffisamment stable pour ARENA, et
          # évite de devoir bumper la CI à chaque release.
          channel: stable
          cache: true

      - name: Print versions
        run: |
          flutter --version
          dart --version

      - name: Stub .env (CI uses placeholders, no real secrets)
        # flutter_dotenv exige que le fichier existe à `flutter pub get`
        # time car il est listé dans pubspec assets. Les valeurs sont
        # bidons — `bootstrap.dart` skip proprement si Supabase URL est
        # un placeholder.
        run: cp .env.example .env

      - name: pub get
        run: flutter pub get

      - name: Code generation (freezed / json_serializable)
        # Indispensable parce que les fichiers .freezed.dart / .g.dart
        # sont committés, mais on les régénère pour valider que le code
        # source et les générés sont cohérents.
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Design-system guard — colors (strict)
        # Bloque toute couleur hardcodée nouvelle hors `lib/core/theme/`.
        # Les KEEPs légitimes (brand, overlay isolate, scrim) sont listés
        # dans `scripts/colors_allowlist.txt`. Strict mode = exit 1 sur
        # régression. Baseline propre au 2026-05-19 (0 régression).
        run: bash scripts/check_colors.sh --strict

      - name: Design-system guard — spacing (info)
        # Compte les `EdgeInsets.*` / `SizedBox(height|width: N)` hardcodés
        # hors tokens `ArenaSpacing.*`. Non-strict : affiche le compteur
        # pour visibilité, sans bloquer le merge (203 violations
        # historiques au 2026-05-19 à résorber progressivement).
        run: bash scripts/check_spacing.sh

      - name: Test (avec coverage)
        run: flutter test --reporter expanded --coverage

      - name: Upload coverage to Codecov
        # Non bloquant : si CODECOV_TOKEN n'est pas configuré (fork PR
        # par ex.), le step ne fail pas le pipeline. Le token est public-
        # safe pour repo public, à mettre en secret pour repo privé.
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        # `fetch-depth: 0` non requis : on scanne le working tree
        # (`gitleaks dir`), pas tout l'historique git — les secrets
        # historiques déjà rotés (cf. .gitleaks.toml) n'ont pas à rouvrir
        # la CI à chaque run.
        uses: actions/checkout@v6

      - name: Secret scan (gitleaks)
        # Bloquant — même posture que le garde-fou couleurs `--strict` :
        # tout nouveau secret committé fait échouer la CI. Les faux positifs
        # connus sont allowlistés dans `.gitleaks.toml`. Binaire épinglé
        # plutôt que l'action (pas de dépendance à une licence org).
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks dir . --config .gitleaks.toml --no-banner --redact --verbose

      - name: Dependency vulnerability scan (OSV)
        # Non bloquant pour l'instant (même posture que le garde-fou spacing) :
        # OSV peut remonter des CVE dans des transitives non corrigeables
        # immédiatement (ex. chaîne build_runner). Sert d'abord à la
        # visibilité ; passer en bloquant une fois la baseline traitée
        # (retirer `continue-on-error` et, au besoin, ajouter un
        # `osv-scanner.toml` pour ignorer les vulns acceptées).
        continue-on-error: true
        env:
          OSV_VERSION: 2.3.8
        run: |
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner scan source --lockfile=pubspec.lock

  build-app-bundle:
    name: Build App Bundle (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Les 2 flavors buildent en parallèle ; `fail-fast: false` pour voir
    # le résultat des deux même si l'un casse (utile pour distinguer une
    # régression globale d'un souci propre à un flavor).
    strategy:
      fail-fast: false
      matrix:
        flavor: [user, admin]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Le build admin (Agora Windows + Firebase + libs natives) sature
      # les ~14 Go du runner pendant mergeNativeLibs → "No space left on
      # device". On libère ~20-30 Go d'outils inutiles ici.
      - name: Free up disk space (runner)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk \
            /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          # Cache les dépendances Gradle entre runs — gros gain sur le
          # 2e build et les suivants.
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Stub .env (CI uses placeholders, no real secrets)
        run: cp .env.example .env

      - name: Stub google-services.json (CI — FCM non câblé)
        # `google-services.json` (config Firebase) est gitignoré, donc
        # absent des runners — il vit dans `android/app/src/<flavor>/`.
        # Le plugin Gradle `com.google.gms.google-services` exige pourtant
        # un fichier avec un client correspondant à l'applicationId, sinon
        # la tâche `processXxxGoogleServices` échoue. Ce stub aux valeurs
        # bidons laisse compiler toute la chaîne Android — FCM n'est
        # simplement pas réellement câblé en CI, sans effet sur le build.
        run: |
          mkdir -p android/app/src/${{ matrix.flavor }}
          echo '{"project_info":{"project_number":"000000000000","project_id":"arena-ci-stub","storage_bucket":"arena-ci-stub.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.arena.app"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyA-CI-STUB-NOT-A-REAL-KEY-000000"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}},{"client_info":{"mobilesdk_app_id":"1:000000000000:android:1111111111111111111111","android_client_info":{"package_name":"com.arena.admin"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyA-CI-STUB-NOT-A-REAL-KEY-000000"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > android/app/src/${{ matrix.flavor }}/google-services.json

      - name: pub get
        run: flutter pub get

      - name: Build release App Bundle (.aab) — flavor ${{ matrix.flavor }}
        # Compile toute la chaîne Android (plugins natifs Kotlin, Gradle,
        # AGP). C'est le job qui aurait attrapé sentry_flutter 9.20.0
        # (`Unresolved reference 'SentryFlutterReplayRecorder'`).
        # Build *release* (et non debug) pour exercer en plus R8/ProGuard
        # (minify + shrink + proguard-rules.pro) : une mauvaise règle de keep
        # qui casse la config R8 est attrapée ici. Le keystore release étant
        # absent en CI, la signature retombe sur debug (cf. build.gradle.kts) —
        # l'artefact n'est pas publiable mais valide toute la chaîne de build.
        #
        # `appbundle` (et non `apk`) car c'est l'artefact RÉEL d'expédition
        # Play Store : Google génère des APK split-par-ABI côté serveur, ce qui
        # divise par ~3 le téléchargement vs l'APK universel (qui embarque les
        # 4 ABI). Valider l'AAB en CI garantit que le chemin de release marche.
        run: >-
          flutter build appbundle --release
          --flavor ${{ matrix.flavor }}
          --target lib/main_${{ matrix.flavor }}.dart

  build-windows:
    name: Build Windows (admin desktop)
    runs-on: windows-latest
    timeout-minutes: 30

    # L'app desktop admin (Fluent UI, `lib/main_admin_desktop.dart`) est un
    # livrable à part entière mais n'était couverte par AUCUN job — une
    # régression propre au build Windows (plugin desktop, CMake, MSVC)
    # passait inaperçue. Ce job compile la cible desktop à chaque PR.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Stub .env (CI uses placeholders, no real secrets)
        run: Copy-Item .env.example .env

      - name: pub get
        run: flutter pub get

      - name: Build Windows (admin desktop)
        # Les fichiers générés (freezed / *.g.dart) sont committés, donc pas
        # de build_runner ici. Debug suffit pour valider la chaîne de build
        # desktop ; le MSIX release reste un livrable manuel signé localement.
        run: flutter build windows --debug --target lib/main_admin_desktop.dart

  edge-functions:
    name: Edge Functions (Deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Les 14 Edge Functions Deno (supabase/functions/) n'étaient couvertes par
    # AUCUN job : une fonction qui ne lint/type-check plus passait inaperçue
    # jusqu'au `supabase functions deploy`. Ce job rattrape ce trou. Trois
    # garde-fous, calibrés sur l'état réel du code au 2026-06-06 :
    #   - lint  : BLOQUANT (baseline propre, 0 problème).
    #   - check : NON bloquant (11 erreurs de typage historiques, voir step).
    #   - fmt   : NON bloquant (code jamais passé à `deno fmt`).
    # Même posture progressive que les garde-fous spacing / OSV : on rend
    # visible d'abord, on bascule en bloquant une fois la baseline résorbée.
    defaults:
      run:
        working-directory: supabase/functions

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          # Épinglé sur la version validée localement (la baseline lint/check
          # ci-dessous en dépend : une autre version peut changer les règles).
          deno-version: "2.8.2"

      - name: Deno lint (bloquant)
        # 0 problème au 2026-06-06 (après retrait de 2 `async` redondants dans
        # _shared/fcm.ts et _shared/apns.ts). Tout nouveau souci de lint dans
        # une Edge Function fait désormais échouer la CI. Périmètre + exclusions
        # (database.types.ts généré) définis dans supabase/functions/deno.json.
        run: deno lint

      - name: Deno type-check (BLOQUANT)
        # `deno check` résout les imports distants (esm.sh / npm:) et type-check.
        # Baseline résorbée le 2026-06-06 (11 erreurs corrigées : importKey
        # BufferSource, type ServiceClient, API RtmTokenBuilder v2). Tout
        # nouveau souci de typage fait désormais échouer la CI. Périmètre :
        # tous les .ts (sources _shared + index + tests).
        run: deno check **/*.ts

      - name: Deno fmt --check (non bloquant — code pas encore formaté)
        # Le code n'a jamais été passé à `deno fmt` (guillemets mixtes, lignes
        # longues). Affiche le diff pour visibilité sans bloquer. Pour nettoyer :
        # `deno fmt` dans supabase/functions/, puis basculer ce step en bloquant.
        continue-on-error: true
        run: deno fmt --check

      - name: Deno test (BLOQUANT)
        # Tests unitaires de _shared/ (TOTP RFC 6238, rate-limit fail-open,
        # config APNs, classes d'erreur). Type-check inclus (le `--no-check`
        # n'est plus nécessaire depuis la résorption de la baseline de typage).
        # `--allow-all` : les tests APNs lisent/écrivent Deno.env. Le `if`
        # exécute aussi automatiquement tout futur *.test.ts ajouté.
        run: |
          if [ -n "$(find . -name '*.test.ts' -o -name '*_test.ts' | head -1)" ]; then
            deno test --allow-all
          else
            echo "Aucun test Deno pour l'instant — step ignoré."
          fi

  db-tests:
    name: DB tests (pgTAP RLS)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Tests pgTAP de `supabase/tests/` : RLS + gardes serveur « argent »
    # (guard montant paiement, validation réservée super_admin, isolation
    # des paiements/gains) + anti-régression RLS chat blocked-pair. C'était
    # le trou P0 de l'audit 2026-06-13 : la sécurité d'accès aux données ne
    # reposait sur AUCUN test automatisé.
    #
    # BLOQUANT depuis le 2026-06-14 (audit reproductibilité). Le blocage
    # historique — replay de `20260507100001_phase8_match_recordings_storage`
    # qui échouait sur `COMMENT ON POLICY ... ON storage.objects` (must be
    # owner) en local — a été résorbé par les fixes d'idempotence (PR
    # #122/#123). Le job tourne désormais vert de bout en bout (start stack +
    # pgTAP), donc la sécurité d'accès aux données (RLS + gardes « argent » :
    # montant paiement, validation super_admin, isolation paiements/gains,
    # anti-régression chat blocked-pair) est validée à CHAQUE PR. Ajouté aux
    # required status checks de `main`.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.101.0

      - name: Start local Supabase stack (applique les migrations)
        # Démarre le Postgres local et rejoue toutes les migrations
        # `supabase/migrations/`. Crée aussi les schémas auth/storage dont
        # dépend le schéma public (ex. profiles.id → auth.users).
        run: supabase start

      - name: Run pgTAP tests
        run: supabase test db
