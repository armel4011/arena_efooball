# ════════════════════════════════════════════════════════════════════
# RÉCAPITULATIF FICHIERS GÉNÉRÉS AUTOMATIQUEMENT
# ════════════════════════════════════════════════════════════════════
#
# Après les commandes ci-dessus, ces fichiers existeront automatiquement :
#
# Android (icônes) :
# - android/app/src/main/res/mipmap-mdpi/ic_launcher.png         48×48
# - android/app/src/main/res/mipmap-hdpi/ic_launcher.png         72×72
# - android/app/src/main/res/mipmap-xhdpi/ic_launcher.png        96×96
# - android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png       144×144
# - android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png      192×192
# - android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml   (adaptive)
#
# Android (splash) :
# - android/app/src/main/res/drawable*/launch_background.xml
# - android/app/src/main/res/drawable*/splash.png (différentes densités)
#
# iOS (icônes) :
# - ios/Runner/Assets.xcassets/AppIcon.appiconset/
#   ├── Icon-App-1024x1024@1x.png
#   ├── Icon-App-60x60@2x.png  (=120×120)
#   ├── Icon-App-60x60@3x.png  (=180×180)
#   ├── ... (13 fichiers au total)
#   └── Contents.json
#
# iOS (splash) :
# - ios/Runner/Assets.xcassets/LaunchImage.imageset/
# - ios/Runner/Base.lproj/LaunchScreen.storyboard
