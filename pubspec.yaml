name: arena
description: "ARENA - Plateforme panafricaine de tournois e-sport mobile (eFootball, Jeu de Dames, EA SPORTS FC Mobile)."
publish_to: 'none'
version: 1.0.12+13

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

# ─────────────────────────────────────────────────────────────────
# NOTE — Stratégie de dépendances
# ─────────────────────────────────────────────────────────────────
# Les libs commentées ci-dessous sont prévues par le master prompt
# mais introduisent des conflits transitifs (ffi, js) lorsqu'on les
# active toutes ensemble en Flutter 3.41 / Dart 3.11.
# Elles seront décommentées au début de leur PHASE respective :
#   - PHASE 0.5 : flutter_onboarding_slider
#   - PHASE 2   : google_sign_in, sign_in_with_apple, reactive_forms
#   - PHASE 2bis: otp, qr_flutter
#   - PHASE 6   : agora_rtm
#   - PHASE 8a (active) : agora_rtc_engine, flutter_screen_recording,
#                 flutter_overlay_window, installed_apps, app_usage,
#                 flutter_foreground_task, permission_handler, file_picker
#   - PHASE 8b (Apple Dev requis) : live_activities
#   - PHASE 10  : firebase_core, firebase_messaging
#   - PHASE 11bis: webview_flutter
# ─────────────────────────────────────────────────────────────────

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  # Cache disque + mémoire des images réseau (bannières promo, miniatures
  # chat, avatars). Évite le re-téléchargement à chaque rebuild/scroll —
  # gain réseau + anti-jank sensible sur la data mobile ciblée (audit perf
  # 2026-06-13).
  cached_network_image: ^3.4.1

  # ─── State management & navigation (PHASE 0/1) ─────────────
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # ─── Models & serialization (utilisé partout) ──────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  meta: ^1.15.0   # @immutable (moteur de dames pur Dart)

  # ─── HTTP / API ────────────────────────────────────────────
  dio: ^5.7.0

  # ─── Backend (Supabase) — PHASE 0 ──────────────────────────
  supabase_flutter: ^2.8.0

  # ─── Crash reporting — PHASE 0 ─────────────────────────────
  # Version épinglée : sentry_flutter 9.20.0 casse la compilation Kotlin
  # Android (`Unresolved reference 'SentryFlutterReplayRecorder'` dans
  # SentryFlutterPlugin.kt). `flutter analyze`/`test` ne lancent pas de
  # build Gradle, donc ne le détectent pas. Retester au prochain bump.
  sentry_flutter: 9.19.0

  # ─── Stockage — PHASE 0/2 ──────────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # ─── Offline-first stack — PHASE 14 (2026-05-28) ───────────
  # `connectivity_plus` : detection du status reseau (online/offline,
  #     wifi vs mobile). Utilise par NetworkStatusService pour driver
  #     le banner UI et la sync queue.
  connectivity_plus: ^6.0.5

  # ─── Deep links (auth + reset password) — PHASE 2 ──────────
  app_links: ^6.3.2

  # ─── Internationalisation — PHASE 1bis ─────────────────────
  intl: ^0.20.2
  devicelocale: ^0.8.2
  timezone: ^0.9.4

  # ─── Web admin responsive — PHASE 11 ───────────────────────
  flutter_adaptive_scaffold: ^0.3.3

  # ─── Environment variables — PHASE 0 ───────────────────────
  flutter_dotenv: ^5.2.1

  # ─── Icons ─────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

  # ─── PHASE 2 — Auth (forms validation) ─────────────────────
  # flutter_onboarding_slider was dropped during wave 1 polish — onboarding
  # is now a native PageView so the layout matches arena_v2.html.
  reactive_forms: ^17.0.1

  # ─── PHASE 2bis — TOTP admin (Google Authenticator) ────────
  otp: ^3.1.4
  qr_flutter: ^4.1.0

  # ─── PHASE 12.5 — Emoji picker pour le chat ────────────────
  emoji_picker_flutter: ^4.3.0
  # Charge un fichier image local depuis la galerie (déjà via
  # file_picker existant, mais image_picker offre un UX caméra)
  image_picker: ^1.1.2

  # ─── PHASE 8 — Anti-cheat + Streaming Agora sélectif ───────
  agora_rtc_engine: ^6.6.3
  flutter_screen_recording: ^2.0.25
  # Anti-triche dual : capture LiveKit (publish-only) + Track Egress, en
  # parallèle du recorder natif (filet de sécurité). Cf. _anticheat_ref/.
  # 2.5.x : compatible connectivity_plus ^6 (2.6+ exige ^7, conflit projet).
  livekit_client: ^2.5.4
  flutter_overlay_window: ^0.5.0
  installed_apps: ^2.1.1
  app_usage: ^4.1.0
  flutter_foreground_task: ^9.2.2
  permission_handler: ^11.3.1
  file_picker: ^8.1.2

  # ─── PHASE 10 — Push notifications (FCM + in-app) ──────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  # Écran d'appel entrant natif (plein écran + sonnerie en boucle +
  # Décrocher/Refuser) déclenché depuis le handler FCM background —
  # une notification ne peut pas sonner en boucle ni passer le verrou.
  flutter_callkit_incoming: ^2.5.0

  # ─── PHASE 11bis — Paiement P2P manuel (dial USSD) ─────────
  url_launcher: ^6.3.1

  # ─── PHASE 12.5 — RGPD export (écrit le JSON dans Documents) ──
  path_provider: ^2.1.5

  # ─── MAJ in-app hors Play Store (APK direct arena237.com) ────
  # package_info_plus : lit la version installée (compare au config distant)
  # open_filex : ouvre l'APK téléchargé → installateur système Android
  package_info_plus: ^9.0.0
  open_filex: ^4.5.0

  # ─── PHASE 2.3 — Social SSO (native config required) ──────
  # Google: native Sign-In → idToken → supabase.auth.signInWithIdToken().
  # Apple: deferred until Apple Developer account is active (PHASE 8b).
  google_sign_in: ^6.2.1

  # ─── PHASE 12.5 — Chat présence + typing (Agora RTM) ───────
  agora_rtm: ^2.2.6

  # ─── Native cold-start splash (fond mid-color matche _ShortSplashScreen)
  flutter_native_splash: ^2.4.1

  # ─── Lot E — Dashboard charts (Phase 11.6) + Export CSV (11.7) ──
  fl_chart: ^0.69.0
  csv: ^6.0.0
  share_plus: ^10.1.4
  # NB : on utilise file_picker.saveFile() (déjà dans deps PHASE 8a)
  # pour ouvrir le picker SAF natif Android — pas de file_saver.

  # ─── PHASE DESKTOP — Admin Windows (Fluent UI) ─────────────
  # Entrée dédiée `lib/main_admin_desktop.dart` — design Windows 11
  # natif (fluent_ui), fenêtre gérée par window_manager. Le code
  # métier (repositories/providers/models) est partagé avec le mobile.
  fluent_ui: ^4.9.0
  window_manager: ^0.4.2

  # ─── DEFERRED (à activer dans leur PHASE) ──────────────────
  #
  # PHASE 2.3 — Apple SSO (compte Apple Developer requis)
  # sign_in_with_apple: ^6.1.3
  #
  # PHASE 8b — iOS Live Activity (requiert compte Apple Developer)
  # live_activities: ^2.4.9
  #
  # PHASE 11bis — Paiements
  # webview_flutter: ^4.10.0

# ─────────────────────────────────────────────────────────────────
# DEPENDENCY OVERRIDES — résolution conflits transitifs PHASE 8
# ─────────────────────────────────────────────────────────────────
# Deux conflits côté Phase 8 :
#   1. `ffi` — agora_rtc_engine épingle ^1.1.2, sentry_flutter ^9 veut ^2.0.0.
#      ffi 2.x est rétro-compatible 1.x pour l'API utilisée par Agora
#      (Pointer, Struct, allocators).
#   2. `js` — agora_rtc_engine veut ^0.6.3, flutter_screen_recording (web)
#      veut ^0.7.1. js 0.7 reste backward compatible pour l'interop JS
#      qu'Agora utilise côté web (qui n'est de toute façon pas une cible
#      build de l'app, on est mobile-only).
# À retester à chaque bump d'Agora, Sentry ou flutter_screen_recording.
dependency_overrides:
  ffi: ^2.1.0
  js: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  # Temps virtuel pour des tests de timing déterministes (poll_stream).
  fake_async: ^1.3.1
  # Mock de la plateforme connectivity_plus dans les tests de
  # NetworkStatusService (ConnectivityPlatform.instance).
  connectivity_plus_platform_interface: ^2.1.0

  # ─── Lints ──────────────────────────────────────────────────
  very_good_analysis: ^10.2.0
  # custom_lint + riverpod_lint disabled — they pin analyzer_plugin to a
  # version incompatible with analyzer 7.x as of 2026-05. Re-enable once
  # those packages catch up. Project works without them.

  # ─── Code generation ───────────────────────────────────────
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  # riverpod_generator removed — pulls custom_lint_core which is
  # incompatible with analyzer 7.6 (needs 7.7+ APIs). We write providers
  # manually, no codegen needed for Riverpod.

  # ─── Build flavors ─────────────────────────────────────────
  flutter_flavorizr: ^2.2.3

  # ─── Branding pack v2 (icônes Vector Strike F2) ─────────────
  # Génération : voir docs/BRANDING.md
  flutter_launcher_icons: ^0.13.1

  # ─── Desktop Windows : packaging MSIX (installeur) ──────────
  # Génération : voir docs/DISTRIBUTION_DESKTOP.md
  msix: ^3.16.13

  # ─── Tests ─────────────────────────────────────────────────
  mocktail: ^1.0.4
  # Importés directement par les tests (mocks/fakes) — déclarés ici pour
  # satisfaire `depend_on_referenced_packages` (sinon on dépend de la
  # résolution transitive, fragile à tout bump). Déjà tirées par
  # supabase_flutter / path_provider.
  functions_client: ^2.5.0                 # FunctionsClient/FunctionResponse
  path_provider_platform_interface: ^2.1.2 # _FakePathProvider
  plugin_platform_interface: ^2.1.8        # MockPlatformInterfaceMixin

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/translations/
    - assets/icons/

# ─────────────────────────────────────────────────────────────────
# Branding pack v2 — App icons USER (config par défaut)
# ─────────────────────────────────────────────────────────────────
# Génération : flutter pub run flutter_launcher_icons
# Variante ADMIN : flutter_launcher_icons-admin.yaml à la racine.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/arena_user_1024.png"
  # Adaptive icons désactivés : le master 1024 USER est monolithique (dégradé
  # + chevrons + texte « ARENA »). Le séparer en foreground/background ferait
  # sortir le texte de la safe zone 66% (cropped par les masks Android 8+).
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icons/arena_user_1024.png"
    background_color: "#0A0A0F"
    theme_color: "#4C7AFF"

# ─────────────────────────────────────────────────────────────────
# Native cold-start splash USER (matche _ShortSplashScreen mid color)
# ─────────────────────────────────────────────────────────────────
# Le fond #1A2D5C est exactement le stop 55% du dégradé F2 utilisé par
# `SplashScreen` et `_ShortSplashScreen`. Sur Android 12+, le système
# affichera `ic_launcher` (master ARENA) au centre par défaut — on ne
# fournit volontairement pas d'`image` pour bénéficier du fallback OS.
# Génération : flutter pub run flutter_native_splash:create
# Variante ADMIN : flutter_native_splash-admin.yaml à la racine.
flutter_native_splash:
  color: "#1A2D5C"
  android_12:
    color: "#1A2D5C"
    icon_background_color: "#1A2D5C"
  ios: true
  android: true
  fullscreen: true

# ─────────────────────────────────────────────────────────────────
# Packaging MSIX — ARENA Admin Desktop (Windows)
# ─────────────────────────────────────────────────────────────────
# Génération de l'installeur (après un build release) :
#   flutter build windows -t lib/main_admin_desktop.dart
#   dart run msix:create --build-windows false
# Le certificat (windows/certificates/, gitignoré) signe le paquet ;
# son mot de passe N'EST PLUS stocké ici (fuite de secret) — il est passé
# exclusivement en CLI au build :
#   dart run msix:create --password "$env:ARENA_MSIX_CERT_PASSWORD"
# voir docs/DISTRIBUTION_DESKTOP.md pour l'installation sur d'autres postes.
msix_config:
  display_name: ARENA Admin
  publisher_display_name: Arena
  identity_name: com.arena.admin.desktop
  publisher: CN=Arena Admin
  # Aligné sur `version:` mobile (1.0.5) — MSIX exige un 4e segment (build).
  # À garder synchrone à chaque bump (audit 2026-06-14).
  msix_version: 1.0.5.0
  logo_path: assets/icons/arena_admin_1024.png
  capabilities: internetClient
  certificate_path: windows/certificates/arena_admin.pfx
  install_certificate: false
  build_windows: false
  output_path: dist
  output_name: arena-admin-setup
  languages: fr-fr, en-us
