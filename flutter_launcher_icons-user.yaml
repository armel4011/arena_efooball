# ─────────────────────────────────────────────────────────────────
# Branding pack v2 — App icons USER (flavor explicite)
# ─────────────────────────────────────────────────────────────────
# Pourquoi ce fichier ? flutter_launcher_icons v0.13 détecte
# `*-admin.yaml` à la racine et ignore alors la section
# `flutter_launcher_icons:` du pubspec. On force USER avec son propre
# fichier flavor pour avoir une génération équilibrée.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/arena_user_1024.png"
  # Adaptive icons désactivés : le master 1024 est monolithique (dégradé +
  # chevrons + texte « ARENA »). Si on séparait foreground/background le
  # texte « ARENA » sortirait de la safe zone 66% et serait coupé par le
  # mask circulaire/squircle du launcher Android 8+.
  remove_alpha_ios: true
