<?xml version="1.0" encoding="UTF-8"?>
<!--
  ARENA — Icône USER version compacte (sans texte ARENA)
  Pour utilisation aux tailles < 80px où le texte deviendrait illisible.
  Le symbole est agrandi et centré pour maximiser la lisibilité.
-->
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <defs>
    <linearGradient id="bg-user-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4C7AFF"/>
      <stop offset="55%" stop-color="#1A2D5C"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg-user-c)"/>

  <!-- Symbole centré et agrandi (sans texte) -->
  <polygon points="180,330 360,330 580,520 360,710 180,710 400,520" fill="#FFFFFF"/>
  <polygon points="360,330 520,330 740,520 520,710 360,710 580,520" fill="#FF2D55"/>
  <polygon points="520,330 680,330 900,520 680,710 520,710 740,520" fill="#FFFFFF" opacity="0.55"/>
</svg>
