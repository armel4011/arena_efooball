# ════════════════════════════════════════════════════════════════════
# ARENA ADMIN — Configuration du splash natif (branding pack 2026-05-18)
# ════════════════════════════════════════════════════════════════════
# Génération :
#   flutter pub run flutter_native_splash:create --path=flutter_native_splash-admin.yaml
#
# Idem launcher_icons : la commande écrit dans `android/app/src/main/res/` ;
# on déplace ensuite `drawable*` + `values*` + `mipmap-*` (splash) vers
# `android/app/src/admin/res/` pour cibler la variante ADMIN.
# ════════════════════════════════════════════════════════════════════

flutter_native_splash:
  color: "#FF2D55"
  image: "assets/splash/splash_admin.png"
  android_12:
    image: "assets/splash/splash_icon_admin.png"
    color: "#0A0A0F"
    icon_background_color: "#FF2D55"
  ios: true
  ios_content_mode: scaleAspectFill
  android: true
  android_gravity: fill
  fullscreen: true
