name: CI

# Déclenché sur push main + chaque PR. Vérifie que le code compile sans
# erreur statique (flutter analyze) et que la suite de tests existante
# passe. Sert de filet de sécurité avant merge — Flutter SDK n'est pas
# fourni par les runners GitHub, on utilise subosito/flutter-action qui
# le télécharge et le met en cache.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les jobs en cours sur la même branche : utile quand on push
# plusieurs commits d'affilée — pas besoin de tout évaluer.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java 17
        # Requis pour build_runner / freezed (analyzer dépend du JDK).
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pas de pin de version : `app_usage 4.1.0` exige Dart ≥ 3.8,
          # ce qui n'est dispo qu'à partir de Flutter 3.32. Le channel
          # `stable` tracking est suffisamment stable pour ARENA, et
          # évite de devoir bumper la CI à chaque release.
          channel: stable
          cache: true

      - name: Print versions
        run: |
          flutter --version
          dart --version

      - name: Stub .env (CI uses placeholders, no real secrets)
        # flutter_dotenv exige que le fichier existe à `flutter pub get`
        # time car il est listé dans pubspec assets. Les valeurs sont
        # bidons — `bootstrap.dart` skip proprement si Supabase URL est
        # un placeholder.
        run: cp .env.example .env

      - name: pub get
        run: flutter pub get

      - name: Code generation (freezed / json_serializable)
        # Indispensable parce que les fichiers .freezed.dart / .g.dart
        # sont committés, mais on les régénère pour valider que le code
        # source et les générés sont cohérents.
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Design-system guard — colors (strict)
        # Bloque toute couleur hardcodée nouvelle hors `lib/core/theme/`.
        # Les KEEPs légitimes (brand, overlay isolate, scrim) sont listés
        # dans `scripts/colors_allowlist.txt`. Strict mode = exit 1 sur
        # régression. Baseline propre au 2026-05-19 (0 régression).
        run: bash scripts/check_colors.sh --strict

      - name: Design-system guard — spacing (info)
        # Compte les `EdgeInsets.*` / `SizedBox(height|width: N)` hardcodés
        # hors tokens `ArenaSpacing.*`. Non-strict : affiche le compteur
        # pour visibilité, sans bloquer le merge (203 violations
        # historiques au 2026-05-19 à résorber progressivement).
        run: bash scripts/check_spacing.sh

      - name: Test
        run: flutter test --reporter expanded
