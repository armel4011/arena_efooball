# ════════════════════════════════════════════════════════════════════
# ARENA — Pubspec.yaml exemple consolidé (icônes + splash)
# ════════════════════════════════════════════════════════════════════
# Voici les SECTIONS à ajouter dans ton pubspec.yaml existant.
# Ne remplace PAS ton fichier en entier — copie juste ces sections
# en gardant tes dépendances actuelles.
# ════════════════════════════════════════════════════════════════════

name: arena
description: Plateforme e-sport panafricaine.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# ────────────────────────────────────────────────────────────────────
# DÉPENDANCES PRINCIPALES
# ────────────────────────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter
  
  # ⭐ Pour le splash screen
  flutter_riverpod: ^2.4.10        # state management
  shared_preferences: ^2.2.2       # détection 1er lancement
  google_fonts: ^6.2.1             # Bebas Neue, Instrument Serif
  
  # ... tes autres dépendances ARENA existantes
  # supabase_flutter: ^2.0.0
  # firebase_core: ^2.24.0
  # etc.


# ────────────────────────────────────────────────────────────────────
# DÉPENDANCES DEV (génération automatique des icônes/splash)
# ────────────────────────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_launcher_icons: ^0.13.1   # génère icônes iOS + Android
  flutter_native_splash: ^2.4.1     # génère splash natifs


# ════════════════════════════════════════════════════════════════════
# CONFIGURATION ICÔNES (USER par défaut)
# ════════════════════════════════════════════════════════════════════
# Pour générer : flutter pub run flutter_launcher_icons
# ════════════════════════════════════════════════════════════════════
flutter_launcher_icons:
  # Plateformes cibles
  android: "ic_launcher"
  ios: true
  
  # Image source principale (1024×1024 avec texte ARENA)
  image_path: "assets/icons/arena_user_1024.png"
  
  # Adaptive Icons Android 8+
  adaptive_icon_background: "assets/icons/adaptive_user/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/icons/adaptive_user/ic_launcher_foreground.png"
  adaptive_icon_monochrome: "assets/icons/adaptive_user/ic_launcher_monochrome.png"
  
  # iOS spécifique (obligatoire pour App Store)
  remove_alpha_ios: true
  
  # Web PWA (si activé plus tard)
  web:
    generate: true
    image_path: "assets/icons/arena_user_1024.png"
    background_color: "#0A0A0F"
    theme_color: "#4C7AFF"


# ════════════════════════════════════════════════════════════════════
# CONFIGURATION SPLASH NATIF (USER par défaut)
# ════════════════════════════════════════════════════════════════════
# Pour générer : flutter pub run flutter_native_splash:create
# 
# Ce splash s'affiche ~200ms avant que Flutter démarre.
# Doit visuellement matcher le widget SplashScreen pour fluidité.
# ════════════════════════════════════════════════════════════════════
flutter_native_splash:
  # Couleur de fond (matche le coin haut-gauche du dégradé)
  color: "#4C7AFF"
  
  # Image plein écran (Android < 12 et iOS)
  image: "assets/splash/splash_user.png"
  
  # Android 12+ : icône centrée seule (l'OS impose ce format)
  android_12:
    image: "assets/splash/splash_icon_user.png"
    color: "#0A0A0F"
    icon_background_color: "#4C7AFF"
  
  # Plateformes
  ios: true
  ios_content_mode: scaleAspectFill
  android: true
  android_gravity: fill
  web: true
  web_image_mode: cover
  
  # Plein écran (cache la status bar)
  fullscreen: true


# ════════════════════════════════════════════════════════════════════
# DÉCLARATION DES ASSETS
# ════════════════════════════════════════════════════════════════════
flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/icons/adaptive_user/
    - assets/icons/adaptive_admin/
    - assets/splash/
    # ... tes autres assets ARENA


# ════════════════════════════════════════════════════════════════════
# POUR LE FLAVOR ADMIN
# ════════════════════════════════════════════════════════════════════
# Crée 2 fichiers SÉPARÉS à la racine du projet :
# 
# 1. flutter_launcher_icons-admin.yaml
# 2. flutter_native_splash-admin.yaml
# 
# Le contenu de chacun est fourni dans le pack branding.
# 
# Génération :
#   flutter pub run flutter_launcher_icons -f flutter_launcher_icons-admin.yaml
#   flutter pub run flutter_native_splash:create --path=flutter_native_splash-admin.yaml
# ════════════════════════════════════════════════════════════════════
