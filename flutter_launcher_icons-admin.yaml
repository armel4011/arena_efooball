# ─────────────────────────────────────────────────────────────────
# Branding pack v2 — App icons ADMIN
# ─────────────────────────────────────────────────────────────────
# Génération : flutter pub run flutter_launcher_icons -f flutter_launcher_icons-admin.yaml
# Le pubspec USER est la config par défaut.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/arena_admin_1024.png"
  adaptive_icon_background: "assets/icons/adaptive/admin/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/icons/adaptive/admin/ic_launcher_foreground.png"
  adaptive_icon_monochrome: "assets/icons/adaptive/admin/ic_launcher_monochrome.png"
  remove_alpha_ios: true
