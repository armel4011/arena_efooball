include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/generated/**"
    - "build/**"
    # Branding pack stocké tel quel : exemples + scripts non-Flutter.
    # Le nom du dossier varie entre commits (lower/upper case sur certains
    # systèmes de fichiers), on couvre les deux pour que `flutter analyze`
    # soit cohérent entre Windows local (case-insensitive) et Linux CI
    # (case-sensitive).
    - "ARENA_BRANDING_PACK/**"
    - "arena_branding_pack/**"
  errors:
    invalid_annotation_target: ignore

linter:
  rules:
    # Project-specific overrides
    public_member_api_docs: false
    lines_longer_than_80_chars: false
    avoid_redundant_argument_values: false
    document_ignores: false
    # We group deps by PHASE, not alphabetically — see pubspec.yaml.
    sort_pub_dependencies: false

    # ─── Règles désactivées au bump very_good_analysis 6 → 10 (2026-06-14) ──
    # Ces 3 règles, nouvelles en v7-v10, vont à l'encontre de choix
    # d'architecture VOLONTAIRES d'Arena. On les neutralise explicitement
    # plutôt que de rester 4 majeures en retard sur le lint set.
    #
    # 1) avoid_catches_without_on_clauses (207 hits) : Arena est offline-first.
    #    Les repositories/services attrapent volontairement `catch (e)` large
    #    pour figer sur le cache et ne jamais crasher hors-ligne (cf.
    #    persistent_cache, NetworkStatusService). Forcer `on Exception` casserait
    #    ce filet (les erreurs Realtime ne sont pas toutes des Exception).
    avoid_catches_without_on_clauses: false
    # 2) discarded_futures (80 hits) : le fire-and-forget est intentionnel et
    #    déjà explicité par `unawaited(...)` aux endroits critiques (persist
    #    cache, setAuth Realtime). La règle reste bruyante sur les callbacks UI.
    discarded_futures: false
    # 3) specify_nonobvious_property_types (80 hits) : très opinionnée (v10),
    #    redondante avec l'inférence ; faible valeur pour le surcoût de churn.
    specify_nonobvious_property_types: false

# Custom lints — design system guards
# ─────────────────────────────────────────────────────────────────────────────
# The analyzer can't natively enforce "no numeric literal in EdgeInsets/SizedBox"
# or "no hardcoded Color() outside lib/core/theme/" yet (would need
# `custom_lint`, currently incompatible with analyzer 7.x — see pubspec.yaml
# notes). Until then, two guard scripts cover the gap :
#
#   * `scripts/check_spacing.{sh,ps1}` — scan lib/ for hardcoded EdgeInsets/
#     SizedBox literals. Use ArenaSpacing.{xs,sm,md,lg,xl,xxl,xxxl} instead.
#
#   * `scripts/check_colors.{sh,ps1}` — scan lib/ for hardcoded `Color(0xFF…)`
#     ou `Colors.{white,black,red,…}`. Les fichiers KEEP justifiés (brand-
#     protected, overlay isolate, gradient contrast, scrim) sont listés dans
#     `scripts/colors_allowlist.txt` ; toute violation hors allowlist =
#     régression. Use ArenaColors.* tokens instead.
#
# Les deux scripts supportent `--strict` (resp. `-Strict`) qui exit 1 si une
# régression est trouvée — appelable depuis CI ou git pre-commit.
