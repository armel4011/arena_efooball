# ════════════════════════════════════════════════════════════════════
# COMMANDES À LANCER DANS L'ORDRE
# ════════════════════════════════════════════════════════════════════
#
# 1. flutter pub get
#
# 2. Générer icônes USER (default config)
#    flutter pub run flutter_launcher_icons
#
# 3. Générer icônes ADMIN
#    flutter pub run flutter_launcher_icons -f flutter_launcher_icons-admin.yaml
#
# 4. Générer splash USER
#    flutter pub run flutter_native_splash:create
#
# 5. Générer splash ADMIN
#    flutter pub run flutter_native_splash:create --path=flutter_native_splash-admin.yaml
#
# 6. flutter clean && flutter pub get
#
# 7. flutter run --flavor user   (ou simplement flutter run si pas de flavors)
#    flutter run --flavor admin


