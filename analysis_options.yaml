include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/generated/**"
    - "build/**"
    # Branding pack stocké tel quel : exemples + scripts non-Flutter.
    - "ARENA_BRANDING_PACK/**"
  errors:
    invalid_annotation_target: ignore

linter:
  rules:
    # Project-specific overrides
    public_member_api_docs: false
    lines_longer_than_80_chars: false
    avoid_redundant_argument_values: false
    document_ignores: false
    # We group deps by PHASE, not alphabetically — see pubspec.yaml.
    sort_pub_dependencies: false

# Custom lints — design system guards
# ─────────────────────────────────────────────────────────────────────────────
# The analyzer can't natively enforce "no numeric literal in EdgeInsets/SizedBox"
# or "no hardcoded Color() outside lib/core/theme/" yet (would need
# `custom_lint`, currently incompatible with analyzer 7.x — see pubspec.yaml
# notes). Until then, two guard scripts cover the gap :
#
#   * `scripts/check_spacing.{sh,ps1}` — scan lib/ for hardcoded EdgeInsets/
#     SizedBox literals. Use ArenaSpacing.{xs,sm,md,lg,xl,xxl,xxxl} instead.
#
#   * `scripts/check_colors.{sh,ps1}` — scan lib/ for hardcoded `Color(0xFF…)`
#     ou `Colors.{white,black,red,…}`. Les fichiers KEEP justifiés (brand-
#     protected, overlay isolate, gradient contrast, scrim) sont listés dans
#     `scripts/colors_allowlist.txt` ; toute violation hors allowlist =
#     régression. Use ArenaColors.* tokens instead.
#
# Les deux scripts supportent `--strict` (resp. `-Strict`) qui exit 1 si une
# régression est trouvée — appelable depuis CI ou git pre-commit.
