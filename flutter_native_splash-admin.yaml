# ─────────────────────────────────────────────────────────────────
# Branding pack v2 — Cold-start splash ADMIN
# ─────────────────────────────────────────────────────────────────
# Génération : flutter pub run flutter_native_splash:create --path=flutter_native_splash-admin.yaml
# Le pubspec USER est la config par défaut.
flutter_native_splash:
  color: "#FF2D55"
  image: "assets/splash/splash_admin.png"
  android_12:
    image: "assets/splash/splash_icon_admin.png"
    color: "#0A0A0F"
    icon_background_color: "#FF2D55"
  ios: true
  ios_content_mode: scaleAspectFill
  android: true
  android_gravity: fill
  fullscreen: true
